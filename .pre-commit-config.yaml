# Install: pip install pre-commit && pre-commit install
# Requires: shellcheck on PATH (brew install shellcheck), Node/npx (markdownlint-cli2).
# Run all hooks: pre-commit run --all-files
# Mirrors .github/workflows/ci.yml (CI installs shellcheck via apt).
repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        types: [shell]
        args: [-x]
        files: ^scripts/.*\.sh$

      - id: markdownlint-cli2
        name: markdownlint-cli2
        entry: npx --yes markdownlint-cli2
        language: system
        pass_filenames: false
        files: ^(.*\.(md|markdown)|\.markdownlint.*|\.markdownlint-cli2\.jsonc)$
