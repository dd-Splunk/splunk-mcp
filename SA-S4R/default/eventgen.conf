# Splunk Eventgen — see https://splunk.github.io/eventgen/
# Deploy under an app, e.g. $SPLUNK_HOME/etc/apps/<your_app>/default/eventgen.conf
# Place this file and *.sample / *.txt next to each other (or set paths relative to the app).

[global]
debug = false

# Apache/NCSA combined + referer + user-agent (Splunk sourcetype access_combined)
[access_combined.sample]
interval = 1
count = 100
randomizeCount = 0.5
index = main
sourcetype = access_combined

# Tokens: string literals in the sample, or regex with a capture group for the part to replace
# (see https://splunk.github.io/eventgen/BASICS.html — e.g. random guid).
token.0.token = CLIENTIP
token.0.replacementType = random
token.0.replacement = ipv4

token.1.token = TIME
token.1.replacementType = timestamp
token.1.replacement = %d/%b/%Y:%H:%M:%S %z

token.2.token = METHOD
token.2.replacementType = file
token.2.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/method.txt

token.3.token = PATH
token.3.replacementType = file
token.3.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/path.txt

# uid query param: replace UUID with a new random guid each event (no uid.txt)
token.4.token = uid=([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})
token.4.replacementType = random
token.4.replacement = guid

token.5.token = PRODUCTID
token.5.replacementType = file
token.5.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/product_id.txt

# SESSVAL = session id value only; param name JSESSIONID= stays literal (avoids token clash)
token.6.token = SESSVAL
token.6.replacementType = file
token.6.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/jsessionid.txt

token.7.token = STATUS
token.7.replacementType = file
token.7.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/status.txt

token.8.token = BYTES
token.8.replacementType = random
token.8.replacement = integer[512:1024]

token.9.token = REFERER
token.9.replacementType = file
token.9.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/referer.txt

token.10.token = USERAGENT
token.10.replacementType = file
token.10.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/useragent.txt
