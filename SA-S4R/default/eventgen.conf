# Splunk Eventgen — Buttercup Enterprises workshop-shaped access_combined traffic.
# See https://splunk.github.io/eventgen/
# Matches Splunk4Rookies noise_apache.log: /product.screen + /cart.do?action=...

[global]
debug = false

# Product page views (~67% of events) — uid present, no action=
[product.screen.sample]
interval = 1
count = 34
randomizeCount = 0.8
index = main
sourcetype = access_combined

token.0.token = CLIENTIP
token.0.replacementType = random
token.0.replacement = ipv4

token.1.token = TIME
token.1.replacementType = timestamp
token.1.replacement = %d/%b/%Y:%H:%M:%S %z

token.2.token = METHOD
token.2.replacementType = file
token.2.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/method.txt

token.3.token = uid=([0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12})
token.3.replacementType = random
token.3.replacement = guid

token.4.token = PRODUCTID
token.4.replacementType = file
token.4.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/product_id.txt

token.5.token = SESSVAL
token.5.replacementType = file
token.5.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/jsessionid.txt

token.6.token = STATUS
token.6.replacementType = file
token.6.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/status.txt

token.7.token = BYTES
token.7.replacementType = random
token.7.replacement = integer[400:4000]

token.8.token = REFERER
token.8.replacementType = file
token.8.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/referer.txt

token.9.token = USERAGENT
token.9.replacementType = file
token.9.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/useragent.txt

token.10.token = RESPTIME
token.10.replacementType = random
token.10.replacement = integer[150:960]

# Cart actions (~33%) — action=view|addtocart|purchase|remove|changequantity
[cart.do.sample]
interval = 1
