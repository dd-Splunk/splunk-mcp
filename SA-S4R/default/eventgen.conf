token.2.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/method.txt

token.3.token = ACTIONVAL
token.3.replacementType = file
token.3.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/action.txt

token.4.token = PRODUCTID
token.4.replacementType = file
token.4.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/product_id.txt

token.5.token = SESSVAL
token.5.replacementType = file
token.5.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/jsessionid.txt

token.6.token = STATUS
token.6.replacementType = file
token.6.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/status.txt

token.7.token = BYTES
token.7.replacementType = random
token.7.replacement = integer[400:4000]

token.8.token = REFERER
token.8.replacementType = file
token.8.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/referer.txt

token.9.token = USERAGENT
token.9.replacementType = file
token.9.replacement = $SPLUNK_HOME/etc/apps/SA-S4R/samples/useragent.txt

token.10.token = RESPTIME
