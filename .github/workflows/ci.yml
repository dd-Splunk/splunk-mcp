# Minimal CI: shell scripts (shellcheck) and Markdown (markdownlint-cli2 via Makefile).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shellcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q shellcheck
          shellcheck -x scripts/*.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Markdownlint
        run: make lint-md
