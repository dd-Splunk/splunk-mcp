services:
  so1:
    hostname: so1
    container_name: so1
    image: ${SPLUNK_IMAGE:-splunk/splunk:latest}
    platform: linux/amd64
    environment:
      SPLUNK_GENERAL_TERMS: --accept-sgt-current-at-splunk-com
      SPLUNK_START_ARGS: --accept-license
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      # Splunkbase: set SPLUNKBASE_USER / SPLUNKBASE_PASS in project .env (see .env.example) or op run --env-file=tpl.env
      SPLUNKBASE_USERNAME: ${SPLUNKBASE_USER}
      SPLUNKBASE_PASSWORD: ${SPLUNKBASE_PASS}
      # Splunkbase: comma-separated package URLs (requires valid SPLUNKBASE_*). Order here:
      #   app/1924  = Splunk Eventgen (sample data / Eventgen modinput)
      #   app/4353  = Config Explorer (optional UI utility)
      #   app/7931  = Splunk MCP Server (required for /services/mcp)
      #   app/7245  = Splunk AI Assistant for SPL
      #   app/2882  = Python for Scientific Computing (Linux x86_64) — required by MLTK / AI Commander REST
      #   app/2890  = Splunk AI Toolkit
      # If a download fails (404, etc.), replace the /release/VERSION/ segment with a current
      # release for that app from https://splunkbase.splunk.com/app/<id> .
      SPLUNK_APPS_URL: https://splunkbase.splunk.com/app/1924/release/8.2.2/download/,https://splunkbase.splunk.com/app/4353/release/1.8.24/download/,https://splunkbase.splunk.com/app/7931/release/1.1.3/download/,https://splunkbase.splunk.com/app/7245/release/2.0.0/download/,https://splunkbase.splunk.com/app/2882/release/4.3.2/download/,https://splunkbase.splunk.com/app/2890/release/5.7.4/download/
      TZ: ${TZ:-Europe/Brussels}
    volumes:
      - so1-var:/opt/splunk/var
      - so1-etc:/opt/splunk/etc
      - ./SA-S4R:/opt/splunk/etc/apps/SA-S4R:rw
      # - ${HOME}/Library/Logs/Claude:/var/log/claude_logs:rw
    ports:
      - "127.0.0.1:8000:8000" # Splunk Web UI (localhost only)
      - "127.0.0.1:8089:8089" # Splunk Management API / MCP Server (localhost only)
    networks:
      - splunk
    restart: always

  splunk-init:
    image: alpine:latest
    container_name: splunk-init
    depends_on:
      so1:
        condition: service_healthy
    volumes:
      - ./scripts/setup-splunk.sh:/setup-splunk.sh:rw
    environment:
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      # Legacy .env: SPLUNK_USER, SPLUNKER_USERNAME, MLTK_ROLES_USER (see setup-splunk.sh)
      SPLUNK_REST_USER: ${SPLUNK_REST_USER:-${SPLUNK_USER:-admin}}
      SPLUNK_MCP_USER: ${SPLUNK_MCP_USER:-${SPLUNKER_USERNAME:-splunker}}
      # MLTK role target (default: SPLUNK_MCP_USER; set admin to match SPLUNK_REST_USER)
      SPLUNK_MLTK_USER: ${SPLUNK_MLTK_USER:-${MLTK_ROLES_USER:-${SPLUNK_MCP_USER:-splunker}}}
      # Splunk AI Toolkit role name (default mltk_dsdl_admin; set empty to skip assignment)
      MLTK_ROLE: ${MLTK_ROLE:-mltk_dsdl_admin}
      # Required: password for the MCP execution user (splunker by default).
      SPLUNK_MCP_PASSWORD: ${SPLUNK_MCP_PASSWORD}
      SPLUNK_HOST: so1
      SPLUNK_PORT: 8089
    command: sh -c "apk add --no-cache curl jq && chmod +x /setup-splunk.sh &&
      /setup-splunk.sh"
    networks:
      - splunk
    restart: "no"

  mcp-proxy:
    build:
      context: ./mcp-proxy
    container_name: mcp-proxy
    depends_on:
      so1:
        condition: service_healthy
    environment:
      SPLUNK_HOST: so1
      SPLUNK_PORT: 8089
      SPLUNK_REST_USER: ${SPLUNK_REST_USER:-${SPLUNK_USER:-admin}}
      SPLUNK_PASSWORD: ${SPLUNK_PASSWORD}
      SPLUNK_MCP_USER: ${SPLUNK_MCP_USER:-${SPLUNKER_USERNAME:-splunker}}
      MCP_PROXY_PORT: ${MCP_PROXY_PORT:-8090}
      # Dev only: Splunk uses self-signed certs by default.
      SPLUNK_TLS_INSECURE: "1"
    ports:
      - "127.0.0.1:${MCP_PROXY_PORT:-8090}:${MCP_PROXY_PORT:-8090}"
    networks:
      - splunk
    restart: always

networks:
  splunk:
    driver: bridge

volumes:
  so1-var:
    name: so1-var
  so1-etc:
    name: so1-etc
